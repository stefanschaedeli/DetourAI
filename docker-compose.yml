version: '3.9'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    image: travelman/backend:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - TEST_MODE=${TEST_MODE:-true}
      - REDIS_URL=redis://redis:6379
      - OUTPUTS_DIR=/app/outputs
      - DATA_DIR=/app/data
      - LOGS_DIR=/app/logs
    depends_on: [redis]
    volumes:
      - ./outputs:/app/outputs
      - travel_data:/app/data
      - ./logs:/app/logs

  celery:
    image: travelman/backend:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    command: celery -A tasks worker --loglevel=info
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - TEST_MODE=${TEST_MODE:-true}
      - REDIS_URL=redis://redis:6379
      - DATA_DIR=/app/data
      - LOGS_DIR=/app/logs
    depends_on: [redis]
    volumes:
      - travel_data:/app/data
      - ./logs:/app/logs

  frontend:
    image: travelman/frontend:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    ports: ["80:8080"]
    depends_on: [backend]

volumes:
  travel_data:
