components:
  schemas:
    AccommodationResearchRequest:
      properties:
        stop_id:
          type: string
          title: Stop Id
        extra_instructions:
          type: string
          title: Extra Instructions
          default: ''
      type: object
      required:
      - stop_id
      title: AccommodationResearchRequest
    AccommodationSelectRequest:
      properties:
        stop_id:
          type: integer
          title: Stop Id
        option_index:
          type: integer
          title: Option Index
      type: object
      required:
      - stop_id
      - option_index
      title: AccommodationSelectRequest
    AddStopRequest:
      properties:
        location:
          type: string
          title: Location
        insert_after_stop_id:
          type: integer
          title: Insert After Stop Id
        nights:
          type: integer
          title: Nights
          default: 1
      type: object
      required:
      - location
      - insert_after_stop_id
      title: AddStopRequest
    ChangePasswordRequest:
      properties:
        current_password:
          type: string
          title: Current Password
        new_password:
          type: string
          title: New Password
      type: object
      required:
      - current_password
      - new_password
      title: ChangePasswordRequest
    Child:
      properties:
        age:
          type: integer
          title: Age
      type: object
      required:
      - age
      title: Child
    ConfirmRegionsBody:
      properties:
        regions:
          anyOf:
          - items:
              additionalProperties: true
              type: object
            type: array
          - type: 'null'
          title: Regions
      type: object
      title: ConfirmRegionsBody
    CreateUserRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
        is_admin:
          type: boolean
          title: Is Admin
          default: false
      type: object
      required:
      - username
      - password
      title: CreateUserRequest
    FeedbackRequest:
      properties:
        text:
          type: string
          maxLength: 5000
          minLength: 10
          title: Text
        screenshot:
          anyOf:
          - type: string
          - type: 'null'
          title: Screenshot
        category:
          type: string
          pattern: ^(bug|vorschlag|general)$
          title: Category
          default: general
      type: object
      required:
      - text
      title: FeedbackRequest
    FrontendLogEntry:
      properties:
        level:
          type: string
          pattern: ^(error|warning|info)$
          title: Level
        message:
          type: string
          maxLength: 5000
          title: Message
        source:
          type: string
          maxLength: 200
          title: Source
          default: ''
        stack:
          type: string
          maxLength: 10000
          title: Stack
          default: ''
      type: object
      required:
      - level
      - message
      title: FrontendLogEntry
    GeocodeRegionRequest:
      properties:
        name:
          type: string
          maxLength: 200
          title: Name
      type: object
      required:
      - name
      title: GeocodeRegionRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LoginRequest:
      properties:
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
      type: object
      required:
      - username
      - password
      title: LoginRequest
    MandatoryActivity:
      properties:
        name:
          type: string
          maxLength: 200
          title: Name
        location:
          anyOf:
          - type: string
            maxLength: 200
          - type: 'null'
          title: Location
      type: object
      required:
      - name
      title: MandatoryActivity
    PasswordResetRequest:
      properties:
        password:
          type: string
          title: Password
      type: object
      required:
      - password
      title: PasswordResetRequest
    PatchJobRequest:
      properties:
        action:
          type: string
          title: Action
        extra_days:
          type: integer
          title: Extra Days
          default: 2
        via_point_location:
          type: string
          title: Via Point Location
          default: ''
      type: object
      required:
      - action
      title: PatchJobRequest
    RecomputeRegionsRequest:
      properties:
        instruction:
          type: string
          maxLength: 1000
          title: Instruction
      type: object
      required:
      - instruction
      title: RecomputeRegionsRequest
    RecomputeRequest:
      properties:
        extra_instructions:
          type: string
          title: Extra Instructions
          default: ''
      type: object
      title: RecomputeRequest
    RemoveStopRequest:
      properties:
        stop_id:
          type: integer
          title: Stop Id
      type: object
      required:
      - stop_id
      title: RemoveStopRequest
    ReorderStopsRequest:
      properties:
        old_index:
          type: integer
          title: Old Index
        new_index:
          type: integer
          title: New Index
      type: object
      required:
      - old_index
      - new_index
      title: ReorderStopsRequest
    ReplaceRegionRequest:
      properties:
        index:
          type: integer
          minimum: 0.0
          title: Index
        instruction:
          type: string
          maxLength: 1000
          title: Instruction
      type: object
      required:
      - index
      - instruction
      title: ReplaceRegionRequest
    ReplaceStopRequest:
      properties:
        stop_id:
          type: integer
          title: Stop Id
        mode:
          type: string
          title: Mode
        manual_location:
          anyOf:
          - type: string
          - type: 'null'
          title: Manual Location
        manual_nights:
          anyOf:
          - type: integer
          - type: 'null'
          title: Manual Nights
        hints:
          anyOf:
          - type: string
          - type: 'null'
          title: Hints
      type: object
      required:
      - stop_id
      - mode
      title: ReplaceStopRequest
    ReplaceStopSelectRequest:
      properties:
        job_id:
          type: string
          title: Job Id
        option_index:
          type: integer
          title: Option Index
      type: object
      required:
      - job_id
      - option_index
      title: ReplaceStopSelectRequest
    SaveTravelRequest:
      properties:
        plan:
          additionalProperties: true
          type: object
          title: Plan
      type: object
      required:
      - plan
      title: SaveTravelRequest
    SetQuotaRequest:
      properties:
        token_quota:
          anyOf:
          - type: integer
          - type: 'null'
          title: Token Quota
      type: object
      title: SetQuotaRequest
    SettingsResetRequest:
      properties:
        section:
          type: string
          pattern: ^(agent|budget|api|geo|system|all)$
          title: Section
      type: object
      required:
      - section
      title: SettingsResetRequest
    SettingsUpdateRequest:
      properties:
        settings:
          additionalProperties: true
          type: object
          title: Settings
      type: object
      required:
      - settings
      title: SettingsUpdateRequest
    StopSelectRequest:
      properties:
        option_index:
          type: integer
          title: Option Index
      type: object
      required:
      - option_index
      title: StopSelectRequest
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
      type: object
      required:
      - access_token
      title: TokenResponse
    TravelRequest:
      properties:
        legs:
          items:
            $ref: '#/components/schemas/TripLeg'
          type: array
          maxItems: 20
          minItems: 1
          title: Legs
        adults:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Adults
          default: 2
        children:
          items:
            $ref: '#/components/schemas/Child'
          type: array
          maxItems: 10
          title: Children
          default: []
        travel_styles:
          items:
            type: string
          type: array
          maxItems: 14
          title: Travel Styles
          default: []
        travel_description:
          type: string
          maxLength: 2000
          title: Travel Description
          default: ''
        mandatory_activities:
          items:
            $ref: '#/components/schemas/MandatoryActivity'
          type: array
          maxItems: 20
          title: Mandatory Activities
          default: []
        preferred_activities:
          items:
            type: string
          type: array
          maxItems: 20
          title: Preferred Activities
          default: []
        max_activities_per_stop:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Max Activities Per Stop
          default: 5
        max_restaurants_per_stop:
          type: integer
          maximum: 10.0
          minimum: 1.0
          title: Max Restaurants Per Stop
          default: 3
        activities_radius_km:
          type: integer
          maximum: 200.0
          minimum: 1.0
          title: Activities Radius Km
          default: 30
        max_drive_hours_per_day:
          type: number
          maximum: 16.0
          minimum: 0.5
          title: Max Drive Hours Per Day
          default: 4.5
        min_nights_per_stop:
          type: integer
          maximum: 14.0
          minimum: 1.0
          title: Min Nights Per Stop
          default: 1
        max_nights_per_stop:
          type: integer
          maximum: 30.0
          minimum: 1.0
          title: Max Nights Per Stop
          default: 5
        proximity_origin_pct:
          type: integer
          maximum: 30.0
          minimum: 0.0
          title: Proximity Origin Pct
          default: 10
        proximity_target_pct:
          type: integer
          maximum: 30.0
          minimum: 0.0
          title: Proximity Target Pct
          default: 15
        accommodation_preferences:
          items:
            type: string
          type: array
          maxItems: 3
          title: Accommodation Preferences
          default: []
        hotel_radius_km:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Hotel Radius Km
          default: 10
        budget_chf:
          type: number
          maximum: 500000.0
          minimum: 100.0
          title: Budget Chf
          default: 3000.0
        budget_buffer_percent:
          type: number
          maximum: 50.0
          minimum: 0.0
          title: Budget Buffer Percent
          default: 10.0
        budget_accommodation_pct:
          type: integer
          maximum: 100.0
          minimum: 0.0
          title: Budget Accommodation Pct
          default: 60
        budget_food_pct:
          type: integer
          maximum: 100.0
          minimum: 0.0
          title: Budget Food Pct
          default: 20
        budget_activities_pct:
          type: integer
          maximum: 100.0
          minimum: 0.0
          title: Budget Activities Pct
          default: 20
        log_verbosity:
          type: string
          pattern: ^(minimal|normal|verbose|debug)$
          title: Log Verbosity
          default: normal
        language:
          type: string
          pattern: ^(de|en|hi)$
          title: Language
          default: de
      type: object
      required:
      - legs
      title: TravelRequest
    TripLeg:
      properties:
        leg_id:
          type: string
          pattern: ^leg-\d+$
          title: Leg Id
        start_location:
          type: string
          maxLength: 200
          title: Start Location
          default: ''
        end_location:
          type: string
          maxLength: 200
          title: End Location
          default: ''
        start_date:
          type: string
          format: date
          title: Start Date
        end_date:
          type: string
          format: date
          title: End Date
        mode:
          type: string
          enum:
          - transit
          - explore
          title: Mode
        via_points:
          items:
            $ref: '#/components/schemas/ViaPoint'
          type: array
          title: Via Points
          default: []
        zone_bbox:
          anyOf:
          - $ref: '#/components/schemas/ZoneBBox'
          - type: 'null'
        zone_guidance:
          items:
            type: string
          type: array
          title: Zone Guidance
          default: []
        explore_description:
          anyOf:
          - type: string
          - type: 'null'
          title: Explore Description
      type: object
      required:
      - leg_id
      - start_date
      - end_date
      - mode
      title: TripLeg
    UpdateNightsRequest:
      properties:
        stop_id:
          type: integer
          title: Stop Id
        nights:
          type: integer
          title: Nights
      type: object
      required:
      - stop_id
      - nights
      title: UpdateNightsRequest
    UpdateTravelRequest:
      properties:
        custom_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Custom Name
        rating:
          anyOf:
          - type: integer
          - type: 'null'
          title: Rating
      type: object
      title: UpdateTravelRequest
    UserResponse:
      properties:
        id:
          type: integer
          title: Id
        username:
          type: string
          title: Username
        is_admin:
          type: boolean
          title: Is Admin
      type: object
      required:
      - id
      - username
      - is_admin
      title: UserResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    ViaPoint:
      properties:
        location:
          type: string
          maxLength: 200
          title: Location
        fixed_date:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          title: Fixed Date
        notes:
          anyOf:
          - type: string
            maxLength: 500
          - type: 'null'
          title: Notes
      type: object
      required:
      - location
      title: ViaPoint
    ZoneBBox:
      properties:
        north:
          type: number
          maximum: 90.0
          minimum: -90.0
          title: North
        south:
          type: number
          maximum: 90.0
          minimum: -90.0
          title: South
        east:
          type: number
          maximum: 180.0
          minimum: -180.0
          title: East
        west:
          type: number
          maximum: 180.0
          minimum: -180.0
          title: West
        zone_label:
          type: string
          maxLength: 100
          title: Zone Label
      type: object
      required:
      - north
      - south
      - east
      - west
      - zone_label
      title: ZoneBBox
  securitySchemes:
    OAuth2PasswordBearer:
      type: oauth2
      flows:
        password:
          scopes: {}
          tokenUrl: /api/auth/login
